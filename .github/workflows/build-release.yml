name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywin32 opencv-python-headless numpy Pillow mss

      - name: Build executable
        run: |
          python -m PyInstaller --onefile --windowed --name L2M_AutoKey --add-data "assets;assets" --add-data "lang.json;." --hidden-import win32gui --hidden-import win32con --hidden-import win32api --hidden-import win32process --hidden-import pywintypes --hidden-import cv2 --hidden-import mss --hidden-import PIL --hidden-import numpy main.py

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: L2M AutoKey ${{ steps.version.outputs.VERSION }}
          body: |
            ## L2M AutoKey ${{ steps.version.outputs.VERSION }}

            ### Download
            - `L2M_AutoKey.exe` — standalone executable (no Python needed)

            ### Requirements
            - Windows 10/11
            - Game window visible (not minimized)
          files: dist/L2M_AutoKey.exe
          draft: false
          prerelease: false
