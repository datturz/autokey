name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywin32 opencv-python-headless numpy Pillow mss supabase python-dotenv httpx

      - name: Build Windows executable
        run: |
          python -m PyInstaller --onefile --windowed --name L2M_AutoKey --add-data "assets;assets" --add-data "lang.json;." --hidden-import supabase --hidden-import postgrest --hidden-import gotrue --hidden-import realtime --hidden-import storage3 --hidden-import supafunc --hidden-import httpx --hidden-import win32gui --hidden-import win32con --hidden-import win32api --hidden-import win32process --hidden-import pywintypes --hidden-import cv2 --hidden-import mss --hidden-import PIL --hidden-import numpy main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: L2M_AutoKey_Windows
          path: dist/L2M_AutoKey.exe

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: L2M_AutoKey_Windows
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
